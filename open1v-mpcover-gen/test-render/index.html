<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号封面</title>
<style>
/*
 * 公众号封面模板 — 4种风格 × 4种文图分布
 * 画布: 1344×572 (2.35:1), Playwright @2x → 2688×1144
 *
 * 文图分布模式:
 * 01 大字报  → 全幅背景 + 左侧渐变遮罩（沉浸式）
 * 02 杂志风  → 左文字区 + 右方框图片（分栏编辑美学）
 * 03 极简    → 纯色底 + 左文字 + 右图标（最安静）
 * 04 像素风  → 全幅背景 + 左侧渐变遮罩（像素画完整展示）
 *
 * 设计原则:
 * P1 标题即封面 — 缩到360px宽仍能读
 * P2 图片是氛围 — 图片不承载信息
 * P3 一种对比策略 — 不混用
 * P4 文图分离或有方向的遮罩 — 文字区100%可读
 * P5 一个记忆点 — 信息流中一眼区分
 * P6 宁少不多 — 无logo/tag/日期
 */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --w: 1344px;
  --h: 572px;
  --sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  --serif: 'Noto Serif SC', 'Source Han Serif SC', Georgia, serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Courier New', monospace;
}

body {
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  padding: 40px;
}

/* ========================================
   Base
   ======================================== */

.cover {
  width: var(--w);
  height: var(--h);
  position: relative;
  overflow: hidden;
}

/* 全幅背景层（01/04使用） */
.cover__bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.cover__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 遮罩层（01/04使用） */
.cover__overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* 内容层 */
.cover__content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
}

/* ========================================
   01 大字报
   模式: 全幅背景 + 左侧渐变遮罩
   ----------------------------------------
   读者感受: "这篇有态度"
   对比: 亮字 on 暗底
   记忆点: 一个红色高亮词
   ======================================== */

.cover--poster {
  background: #08080a;
}

.cover--poster .cover__overlay {
  background: linear-gradient(
    105deg,
    rgba(8, 8, 10, 0.95) 0%,
    rgba(8, 8, 10, 0.85) 28%,
    rgba(8, 8, 10, 0.4) 52%,
    rgba(8, 8, 10, 0.08) 75%,
    transparent 100%
  );
}

.cover--poster .cover__content {
  align-items: center;
  padding: 56px 64px;
}

.cover--poster .cover__text {
  max-width: 46%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cover--poster .cover__title {
  font-family: var(--sans);
  font-size: 68px;
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -2px;
  color: #ffffff;
}

.cover--poster .cover__title .hl {
  color: #e8453c;
}

.cover--poster .cover__subtitle {
  font-family: var(--sans);
  font-size: 20px;
  font-weight: 300;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.5);
  max-width: 380px;
}

/* ========================================
   02 杂志风
   模式: 左文字区 + 右方框图片（分栏）
   ----------------------------------------
   读者感受: "这篇有品位"
   对比: 暗字 on 浅底
   记忆点: 右侧方框图片 + 底部meta栏
   ======================================== */

.cover--magazine {
  background: #f2efe9;
}

.cover--magazine .cover__content {
  display: flex;
  align-items: stretch;
}

/* 左侧文字区: 52% */
.cover--magazine .cover__left {
  width: 52%;
  padding: 44px 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}

.cover--magazine .cover__eyebrow {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #9a7b5a;
  margin-bottom: 20px;
}

.cover--magazine .cover__title {
  font-family: var(--serif);
  font-size: 56px;
  font-weight: 900;
  line-height: 1.12;
  letter-spacing: -1px;
  color: #1a1a1a;
}

.cover--magazine .cover__rule {
  width: 40px;
  height: 2px;
  background: #1a1a1a;
  margin: 20px 0;
}

.cover--magazine .cover__subtitle {
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 300;
  line-height: 1.7;
  color: #555;
  max-width: 360px;
}

/* 底部meta栏 */
.cover--magazine .cover__footer {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 12px 48px;
  border-top: 1px solid rgba(0, 0, 0, 0.06);
  display: flex;
  align-items: center;
  gap: 24px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 1px;
  color: #999;
}

.cover--magazine .cover__footer span {
  opacity: 0.4;
}

/* 右侧图片区: 48% */
.cover--magazine .cover__photo {
  width: 48%;
  padding: 24px 24px 24px 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cover--magazine .cover__photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
  display: block;
}

/* ========================================
   03 极简抽象
   模式: 纯色底 + 左文字 + 右图标
   ----------------------------------------
   读者感受: "这篇很清晰"
   对比: 白字 on 彩底
   记忆点: 右侧手绘图标
   ======================================== */

.cover--minimal {
  background: #7d8c5c;
}

.cover--minimal .cover__content {
  align-items: center;
  padding: 56px 72px;
  justify-content: space-between;
}

.cover--minimal .cover__text {
  max-width: 48%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.cover--minimal .cover__title {
  font-family: var(--sans);
  font-size: 52px;
  font-weight: 700;
  line-height: 1.18;
  letter-spacing: -1px;
  color: #ffffff;
}

.cover--minimal .cover__subtitle {
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 300;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.72);
  max-width: 320px;
}

.cover--minimal .cover__icon {
  display: flex;
  align-items: center;
  justify-content: center;
  padding-right: 16px;
}

.cover--minimal .cover__icon img {
  max-height: 340px;
  max-width: 440px;
  object-fit: contain;
}

/* 配色 */
.cover--minimal[data-color="olive"]    { background: #7d8c5c; }
.cover--minimal[data-color="peach"]    { background: #e8b4a0; }
.cover--minimal[data-color="lavender"] { background: #9b95b8; }
.cover--minimal[data-color="cream"]    { background: #e8d5a3; }
.cover--minimal[data-color="fog"]      { background: #8fa8b8; }
.cover--minimal[data-color="forest"]   { background: #4a6741; }
.cover--minimal[data-color="slate"]    { background: #5c6b7a; }
.cover--minimal[data-color="coral"]    { background: #d4806b; }

/* ========================================
   04 像素风
   模式: 全幅背景 + 左侧渐变遮罩
   ----------------------------------------
   读者感受: "这篇有趣"
   对比: 彩字 on 暗底
   记忆点: 像素字体+金色投影
   ======================================== */

.cover--pixel {
  background: #140f20;
  image-rendering: pixelated;
}

.cover--pixel .cover__bg img {
  image-rendering: pixelated;
}

.cover--pixel .cover__overlay {
  background: linear-gradient(
    100deg,
    rgba(20, 15, 32, 0.93) 0%,
    rgba(20, 15, 32, 0.72) 28%,
    rgba(20, 15, 32, 0.28) 52%,
    transparent 78%
  );
}

.cover--pixel .cover__content {
  align-items: center;
  padding: 56px 56px;
}

.cover--pixel .cover__text {
  max-width: 42%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.cover--pixel .cover__title {
  font-family: var(--mono);
  font-size: 46px;
  font-weight: 700;
  line-height: 1.2;
  color: #f5d245;
  text-shadow:
    3px 3px 0 rgba(80, 40, 0, 0.7),
    -1px -1px 0 rgba(255, 230, 100, 0.2);
}

.cover--pixel .cover__subtitle {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.5);
}

.cover--pixel .cover__border {
  position: absolute;
  inset: 12px;
  border: 2px solid rgba(245, 210, 69, 0.15);
  z-index: 3;
  pointer-events: none;
}
</style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════╗
  ║  01 大字报                                       ║
  ║  文图模式: 全幅背景 + 左侧渐变遮罩               ║
  ║  图片铺满整个画布，左侧叠暗色渐变，白字浮于上层   ║
  ╚══════════════════════════════════════════════════╝
-->
<section class="cover cover--poster" id="cover-poster">
  <div class="cover__bg">
    <!-- BG: 百炼生成的暗调电影感图片（主体偏右） -->
    <!-- <img src="assets/poster-bg.jpg" alt=""> -->
  </div>
  <div class="cover__overlay"></div>
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: ≤10字, 用 <span class="hl">词</span> 高亮1个关键词 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE: ≤15字 --></p>
    </div>
  </div>
</section>

<!--
  ╔══════════════════════════════════════════════════╗
  ║  02 杂志风                                       ║
  ║  文图模式: 左文字区(52%) + 右方框图片(48%)        ║
  ║  图片在独立方框中展示，文字区纯底色100%可读       ║
  ╚══════════════════════════════════════════════════╝
-->
<section class="cover cover--magazine" id="cover-magazine">
  <div class="cover__content">
    <div class="cover__left">
      <p class="cover__eyebrow"><!-- EYEBROW: 英文小标题，如 THE COST OF EVERYTHING --></p>
      <h1 class="cover__title"><!-- TITLE: 中文主标题，≤10字 --></h1>
      <div class="cover__rule"></div>
      <p class="cover__subtitle"><!-- SUBTITLE: 副标题，≤20字 --></p>
      <div class="cover__footer">
        <!-- FOOTER: 底部meta信息，多个span用 · 分隔 -->
        <!-- <span>第三周刊 NO.53</span><span>—</span><span>设计 · 产品 · 技术</span> -->
      </div>
    </div>
    <div class="cover__photo">
      <!-- PHOTO: 百炼生成的图片（独立展示，不需要遮罩） -->
      <!-- <img src="assets/magazine-photo.jpg" alt=""> -->
    </div>
  </div>
</section>

<!--
  ╔══════════════════════════════════════════════════╗
  ║  03 极简抽象                                     ║
  ║  文图模式: 纯色底 + 左文字 + 右图标               ║
  ║  最安静的布局，认知负荷最低                       ║
  ╚══════════════════════════════════════════════════╝
-->
<section class="cover cover--minimal" id="cover-minimal" data-color="olive">
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: ≤8字 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE: ≤12字 --></p>
    </div>
    <div class="cover__icon">
      <!-- ICON: 百炼生成的手绘线条图标（纯色背景上的黑线条画） -->
      <!-- <img src="assets/icon.png" alt=""> -->
    </div>
  </div>
</section>

<!--
  ╔══════════════════════════════════════════════════╗
  ║  04 像素风                                       ║
  ║  文图模式: 全幅背景 + 左侧渐变遮罩               ║
  ║  像素画铺满展示，左侧叠暗紫遮罩，金色字浮上层     ║
  ╚══════════════════════════════════════════════════╝
-->
<section class="cover cover--pixel" id="cover-pixel">
  <div class="cover__bg">
    <!-- BG: 百炼生成的16-bit像素画（主体偏右） -->
    <!-- <img src="assets/pixel-bg.png" alt=""> -->
  </div>
  <div class="cover__overlay"></div>
  <div class="cover__border"></div>
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: ≤6字 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE: ≤10字 --></p>
    </div>
  </div>
</section>

</body>
</html>
