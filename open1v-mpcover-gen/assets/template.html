<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号封面</title>
<style>
/*
 * 公众号封面模板 — 4种风格
 * 画布: 1344×572 (2.35:1), Playwright @2x 输出 2688×1144
 *
 * 设计原则:
 * P1 标题即封面 — 标题占视觉权重 60%+
 * P2 图片是氛围 — 全幅铺满或右侧展示，通过遮罩让文字可读
 * P3 一种对比策略 — 01亮字暗底/02暗字浅底/03白字彩底/04彩字暗底
 * P4 遮罩有方向 — 只覆盖文字区 40-50%，右侧保持图片生动
 * P5 一个记忆点 — 01红色高亮/02极细竖线/03手绘图标/04像素字体
 * P6 宁少不多 — 封面只有标题+副标题+背景，无logo/日期/tag
 */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --w: 1344px;
  --h: 572px;
  --sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  --serif: 'Noto Serif SC', 'Source Han Serif SC', Georgia, serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Courier New', monospace;
}

body {
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  padding: 40px;
}

/* ========================================
   Base Layer System
   Layer 0: __bg       (全幅背景图)
   Layer 1: __overlay  (渐变遮罩)
   Layer 2: __content  (文字/前景元素)
   ======================================== */

.cover {
  width: var(--w);
  height: var(--h);
  position: relative;
  overflow: hidden;
}

.cover__bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.cover__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.cover__overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

.cover__content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
}

/* ========================================
   01 大字报 — 电影海报感
   ----------------------------------------
   读者感受: "这篇有态度"
   策略: 亮字 on 暗底, 最高对比
   记忆点: 一个红色高亮关键词
   ======================================== */

.cover--poster {
  background: #08080a;
}

.cover--poster .cover__overlay {
  background: linear-gradient(
    105deg,
    rgba(8, 8, 10, 0.95) 0%,
    rgba(8, 8, 10, 0.82) 30%,
    rgba(8, 8, 10, 0.35) 55%,
    rgba(8, 8, 10, 0.05) 80%,
    transparent 100%
  );
}

.cover--poster .cover__content {
  padding: 56px 64px;
}

.cover--poster .cover__text {
  max-width: 48%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cover--poster .cover__title {
  font-family: var(--sans);
  font-size: 68px;
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -2px;
  color: #ffffff;
}

.cover--poster .cover__title .hl {
  color: #e8453c;
}

.cover--poster .cover__subtitle {
  font-family: var(--sans);
  font-size: 20px;
  font-weight: 300;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.5);
  max-width: 380px;
}

/* ========================================
   02 杂志风 — 独立杂志编辑美学
   ----------------------------------------
   读者感受: "这篇有品位"
   策略: 暗字 on 浅底, 低对比+精致排版
   记忆点: 一根极细竖线 + 底部期号
   ======================================== */

.cover--magazine {
  background: #f5f3ef;
}

.cover--magazine .cover__overlay {
  background: linear-gradient(
    100deg,
    rgba(245, 243, 239, 0.97) 0%,
    rgba(245, 243, 239, 0.92) 35%,
    rgba(245, 243, 239, 0.5) 55%,
    rgba(245, 243, 239, 0.15) 75%,
    transparent 100%
  );
}

.cover--magazine .cover__content {
  padding: 48px 56px;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
}

.cover--magazine .cover__text {
  max-width: 46%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.cover--magazine .cover__title {
  font-family: var(--sans);
  font-size: 54px;
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -2.5px;
  color: #1a1a1a;
}

.cover--magazine .cover__subtitle {
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 300;
  line-height: 1.65;
  color: #666;
  max-width: 340px;
}

.cover--magazine .cover__meta {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #aaa;
  margin-top: 24px;
}

/* 记忆点: 极细竖线 */
.cover--magazine .cover__divider {
  position: absolute;
  left: 46%;
  top: 48px;
  bottom: 48px;
  width: 1px;
  background: rgba(0, 0, 0, 0.08);
  z-index: 3;
}

/* ========================================
   03 极简抽象 — Claude 博客风
   ----------------------------------------
   读者感受: "这篇很清晰"
   策略: 白字 on 彩色底, 中等对比, 靠色块面积取胜
   记忆点: 右侧手绘图标
   特殊: 不用全幅背景图, 纯色底+右侧图标
   ======================================== */

.cover--minimal {
  background: #7d8c5c;
}

.cover--minimal .cover__content {
  padding: 56px 72px;
  justify-content: space-between;
}

.cover--minimal .cover__text {
  max-width: 48%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.cover--minimal .cover__title {
  font-family: var(--sans);
  font-size: 52px;
  font-weight: 700;
  line-height: 1.18;
  letter-spacing: -1px;
  color: #ffffff;
}

.cover--minimal .cover__subtitle {
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 300;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.72);
  max-width: 320px;
}

/* 记忆点: 右侧手绘图标 */
.cover--minimal .cover__icon {
  display: flex;
  align-items: center;
  justify-content: center;
  padding-right: 24px;
}

.cover--minimal .cover__icon img {
  max-height: 320px;
  max-width: 420px;
  object-fit: contain;
}

/* 配色 */
.cover--minimal[data-color="olive"]    { background: #7d8c5c; }
.cover--minimal[data-color="peach"]    { background: #e8b4a0; }
.cover--minimal[data-color="lavender"] { background: #9b95b8; }
.cover--minimal[data-color="cream"]    { background: #e8d5a3; }
.cover--minimal[data-color="fog"]      { background: #8fa8b8; }
.cover--minimal[data-color="forest"]   { background: #4a6741; }
.cover--minimal[data-color="slate"]    { background: #5c6b7a; }
.cover--minimal[data-color="coral"]    { background: #d4806b; }

/* ========================================
   04 像素风 — 16-bit 游戏怀旧
   ----------------------------------------
   读者感受: "这篇有趣"
   策略: 彩字 on 暗底, 像素锐利边缘打破常规
   记忆点: 像素字体+投影 + 全幅像素画
   ======================================== */

.cover--pixel {
  background: #140f20;
  image-rendering: pixelated;
}

.cover--pixel .cover__bg img {
  image-rendering: pixelated;
}

.cover--pixel .cover__overlay {
  background: linear-gradient(
    100deg,
    rgba(20, 15, 32, 0.92) 0%,
    rgba(20, 15, 32, 0.7) 30%,
    rgba(20, 15, 32, 0.25) 55%,
    transparent 80%
  );
}

.cover--pixel .cover__content {
  padding: 56px 56px;
}

.cover--pixel .cover__text {
  max-width: 44%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.cover--pixel .cover__title {
  font-family: var(--mono);
  font-size: 46px;
  font-weight: 700;
  line-height: 1.2;
  color: #f5d245;
  text-shadow:
    3px 3px 0 rgba(80, 40, 0, 0.7),
    -1px -1px 0 rgba(255, 230, 100, 0.2);
}

.cover--pixel .cover__subtitle {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.5);
}

/* 可选: 像素边框装饰 */
.cover--pixel .cover__border {
  position: absolute;
  inset: 12px;
  border: 2px solid rgba(245, 210, 69, 0.15);
  z-index: 3;
  pointer-events: none;
}
</style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════╗
  ║  01 大字报                               ║
  ║  全幅电影感背景 + 左侧深色遮罩 + 大白字   ║
  ╚══════════════════════════════════════════╝
-->
<section class="cover cover--poster" id="cover-poster">
  <div class="cover__bg">
    <!-- BG: 百炼生成的电影感背景图 -->
    <!-- <img src="assets/poster-bg.jpg" alt=""> -->
  </div>
  <div class="cover__overlay"></div>
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: 主标题，≤10字，可用 <span class="hl">关键词</span> 高亮 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE: 副标题，≤15字 --></p>
    </div>
  </div>
</section>

<!--
  ╔══════════════════════════════════════════╗
  ║  02 杂志风                               ║
  ║  全幅质感背景 + 左侧浅色遮罩 + 深色标题   ║
  ╚══════════════════════════════════════════╝
-->
<section class="cover cover--magazine" id="cover-magazine">
  <div class="cover__bg">
    <!-- BG: 百炼生成的质感/人物/物件背景 -->
    <!-- <img src="assets/magazine-bg.jpg" alt=""> -->
  </div>
  <div class="cover__overlay"></div>
  <div class="cover__divider"></div>
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: 主标题 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE: 副标题 --></p>
      <p class="cover__meta"><!-- META: 如 VOL.07 · DESIGN 期号+分类 --></p>
    </div>
  </div>
</section>

<!--
  ╔══════════════════════════════════════════╗
  ║  03 极简抽象                             ║
  ║  纯马卡龙色底 + 左标题 + 右侧手绘图标     ║
  ╚══════════════════════════════════════════╝
-->
<section class="cover cover--minimal" id="cover-minimal" data-color="olive">
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: 主标题 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE: 副标题 --></p>
    </div>
    <div class="cover__icon">
      <!-- ICON: 百炼生成的手绘线条图标 -->
      <!-- <img src="assets/icon.png" alt=""> -->
    </div>
  </div>
</section>

<!--
  ╔══════════════════════════════════════════╗
  ║  04 像素风                               ║
  ║  全幅像素画背景 + 左侧暗遮罩 + 金色像素字 ║
  ╚══════════════════════════════════════════╝
-->
<section class="cover cover--pixel" id="cover-pixel">
  <div class="cover__bg">
    <!-- BG: 百炼生成的像素画背景 -->
    <!-- <img src="assets/pixel-bg.png" alt=""> -->
  </div>
  <div class="cover__overlay"></div>
  <div class="cover__border"></div>
  <div class="cover__content">
    <div class="cover__text">
      <h1 class="cover__title"><!-- TITLE: ≤6字，游戏感 --></h1>
      <p class="cover__subtitle"><!-- SUBTITLE --></p>
    </div>
  </div>
</section>

</body>
</html>
